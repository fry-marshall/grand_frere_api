services:
  app:
    build:
      context: .
      target: dev
    command: npm run test:e2e -- --forceExit
    container_name: grand_frere_api_test
    env_file: .env.test
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db_test:
        condition: service_healthy

  db_test:
    image: postgres:16-alpine
    container_name: grand_frere_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grand_frere_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
