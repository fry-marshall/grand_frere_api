name: Release

on:
  release:
    types: [published]

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          if ! [[ "${{ github.event.release.tag_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format. Expected v1.0.0"
            exit 1
          fi

  deploy-production:
    needs: validate-tag
    uses: fry-marshall/github-workflows/.github/workflows/api-deploy.yml@main
    with:
      folder: {{DEPLOY_FOLDER}}
      environment: production
    secrets: inherit
